name: opencode

on:
  workflow_dispatch

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 1
        persist-credentials: false

    - name: Run OpenCode
      uses: anomalyco/opencode/github@latest
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        model: opencode/big-pickle
        use_github_token: true
        prompt: |
          Check for library vulnerabilities, and create a PR if there are any recommended fixes
